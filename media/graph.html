<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="{{CSP}}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yggdrasil Blueprint</title>
    <link rel="stylesheet" href="{{STYLE_URI}}" />
  </head>
  <body>
    <header class="toolbar">
      <strong class="brand">🌳 Yggdrasil Blueprint</strong>
      <input id="search" type="search" placeholder="Filter by name…" autocomplete="off" />
      <label class="toggle">
        <input id="show-plugins" type="checkbox" />
        Show plugin skills
      </label>
      <span id="stats"></span>
      <button id="refit" type="button">Fit</button>
    </header>
    <main id="cy" aria-label="Harness graph"></main>
    <footer id="legend">
      <span class="dot workspace"></span>workspace
      <span class="dot skill"></span>skill
      <span class="dot pluginGroup"></span>plugin
      <span class="dot hook"></span>hook
      <span class="dot mcp"></span>mcp
      <span class="dot memory"></span>memory
      <span class="dot permission"></span>permission
      <span class="dot rule"></span>rule
      <span class="dot claudeMd"></span>docs
      <span class="dot env"></span>env
      <span class="dot plugin"></span>plugin-entry
      <span class="dot tool"></span>tool
      <span class="dot configFile"></span>config-file
      <span class="rel-swatch"></span>relationship
    </footer>
    <script nonce="{{NONCE}}" src="{{CYTOSCAPE_URI}}"></script>
    <script nonce="{{NONCE}}" src="{{FCOSE_URI}}"></script>
    <script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
  </body>
</html>
