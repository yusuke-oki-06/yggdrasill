  .sizes { display: flex; align-items: center; gap: 20px; }
  .sz-sm { width: 24px; height: 24px; }
  .sz-lg { width: 96px; height: 96px; }
  svg { display: block; }
  .label { font-size: 10px; opacity: .5; text-align: center; margin-top: 4px; }
</style>
</head>
